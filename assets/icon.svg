<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pulse Project Tracker</title>
  <desc id="desc">Dark rounded app icon with neon blue and green pulse bars.</desc>
  <defs>
    <linearGradient id="bg" x1="82" y1="42" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f2233"/>
      <stop offset="0.52" stop-color="#071018"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="pulse" x1="124" y1="158" x2="390" y2="348" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67ff9a"/>
      <stop offset="1" stop-color="#42d9ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <path d="M104 142h304" stroke="#42d9ff" stroke-width="8" stroke-linecap="round" opacity=".28"/>
  <path d="M104 370h304" stroke="#67ff9a" stroke-width="8" stroke-linecap="round" opacity=".2"/>
  <g filter="url(#glow)">
    <rect x="122" y="166" width="188" height="34" rx="17" fill="#67ff9a"/>
    <rect x="122" y="239" width="268" height="34" rx="17" fill="url(#pulse)"/>
    <rect x="122" y="312" width="148" height="34" rx="17" fill="#42d9ff"/>
  </g>
  <circle cx="362" cy="183" r="24" fill="#42d9ff"/>
  <circle cx="316" cy="329" r="24" fill="#67ff9a"/>
</svg>
